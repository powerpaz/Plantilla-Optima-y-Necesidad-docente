<h1>Healthcheck — PO-App</h1>
<p>Si ves <b>OK</b>, la librería XLSX está cargando bien.</p>
<pre id="out"></pre>
<script>
const ok = (typeof XLSX !== "undefined");
document.getElementById("out").textContent =
  (ok ? "OK ✅ XLSX cargado" : "ERROR ❌ XLSX NO cargado") + "\n" +
  "URL: " + location.href + "\n" +
  "XLSX type: " + (typeof XLSX);
</script>
